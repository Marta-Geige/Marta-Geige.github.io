<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geigenbau-Nahlik</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

/* NAME bleibt normal */
.header-name {
    text-align: center;
    padding: 30px 20px 10px 20px;
    font-size: 32px;
    font-weight: bold;
    color: #122415;
    background-color: #f2f2f2;
}

/* MENÜ FIXIERT */
nav {
    position: fixed;
    top: 70px; /* Höhe des Namensbereichs */
    left: 0;
    width: 100%;
    background-color: #122415B3;
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: #f2f2f2;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO beginnt ganz oben */
.hero img {
    width: 100%;
    display: block;
}

/* Abstand nach oben damit nichts unter Menü liegt */
.hero {
    margin-top: 120px; 
}

/* TEXTBLOCK */
.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 60px 30px;
    background: rgba(242, 242, 242, 0.95);
}
</style>
</head>

<body>

<div class="header-name">
    Geigenbau Marta Nahlik
</div>

<nav>
    <a href="#">Instrumente</a>
    <a href="#">Studium</a>
    <a href="#">Über mich</a>
    <a href="#">Kontakt</a>
</nav>

<section class="hero">
    <img src="images/IMG_4548.jpeg" alt="Werkstatt oder Instrument">
</section>

<div class="container">
    <h1>Instrumente</h1>
    <p>In meiner Arbeit liegt der Schwerpunkt auf der Fertigung von hochwertigen Streichinstrumenten...</p>
</div>

</body>
</html>
