<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Website</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

/* STICKY MENÜ */
nav {
    background-color: #333;
    padding: 15px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: #f2f2f2;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

.container {
    max-width: 1000px;
    margin: 40px auto;
    background: white;
    padding: 30px;
}

/* GALERIE */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-top: 30px;
}

.gallery img {
    width: 100%;
    display: block;
}
</style>
</head>

<body>

<nav>
    <a href="#">Start</a>
    <a href="#">Über mich</a>
    <a href="#">Galerie</a>
    <a href="#">Kontakt</a>
</nav>

<div class="container">
    <h1>Willkommen auf meiner Website</h1>
    <p>Hier kannst du Text einfügen.</p>

    <div class="gallery">
        <img src="https://via.placeholder.com/400" alt="Bild 1">
        <img src="https://via.placeholder.com/400" alt="Bild 2">
        <img src="https://via.placeholder.com/400" alt="Bild 3">
    </div>
</div>

</body>
</html>
