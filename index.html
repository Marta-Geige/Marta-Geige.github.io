<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geigenbau-Nahlik</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

/* HEADER sticky */
.header {
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* HEADER NAME */
.header-name {
    text-align: center;
    padding: 30px 20px 10px 20px;
    font-size: 32px;
    font-weight: bold;
    color: #122415;
    background-color: #f2f2f2;
}

/* MENÜ */
nav {
    background-color: #122415B3;
    padding: 15px;
    text-align: center;
    position: relative;
    z-index: 1001;
}

nav a {
    color: #f2f2f2;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

/* HERO-BILD normal */
.hero {
    width: 100%;
    display: block;
}

.hero img {
    width: 100%;
    height: auto;
    display: block;
}

/* TEXTBLOCK */
.container {
    position: relative;
    max-width: 1000px;
    margin: 0 auto;
    padding: 60px 30px;
    background: rgba(242, 242, 242, 0.95);
}

/* GALERIE */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-top: 30px;
}

.gallery img {
    width: 100%;
    display: block;
}
</style>
</head>
<body>

<header class="header">
    <div class="header-name" id="header-name">
        Geigenbau Marta Nahlik
    </div>
    <nav id="menu">
        <a href="#">Instrumente</a>
        <a href="#">Studium</a>
        <a href="#">Über mich</a>
        <a href="#">Kontakt</a>
    </nav>
</header>

<section class="hero" id="hero">
    <img src="images/IMG_4548.jpeg" alt="Werkstatt oder Instrument">
</section>

<div class="container">
    <h1>Instrumente</h1>
    <p>In meiner Arbeit liegt der Schwerpunkt auf der Fertigung von hochwertigen Streichinstrumenten nach historischen Vorbildern...</p>
    
    <div class="gallery">
        <img src="https://via.placeholder.com/400" alt="Bild 1">
        <img src="https://via.placeholder.com/400" alt="Bild 2">
        <img src="https://via.placeholder.com/400" alt="Bild 3">
    </div>
</div>

<script>
// Dynamische Positionierung des Hero-Bildes
function adjustHeroPosition() {
    const header = document.querySelector('.header');
    const menu = document.getElementById('menu');
    const hero = document.getElementById('hero');

    const headerHeight = header.offsetHeight; // Höhe Name + Menü
    const menuHeight = menu.offsetHeight;     // Höhe nur Menü

    // Hero-Bild nach oben verschieben, so dass obere Kante auf Menü-Oberkante sitzt
    hero.style.marginTop = `-${headerHeight - menuHeight}px`;
}

// Initial ausführen
adjustHeroPosition();

// Auch bei Fenstergröße ändern
window.addEventListener('resize', adjustHeroPosition);
</script>

</body>
</html>
