<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geigenbau-Nahlik</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER sticky */
.header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: transparent;
}

/* HEADER NAME */
.header-name {
    text-align: center;
    padding: 30px 20px 10px 20px;
    font-size: 32px;
    font-weight: bold;
    color: #122415;
    background-color: #f2f2f2;
}

/* MENÜ */
nav {
    background-color: #122415B3;
    padding: 15px;
    text-align: center;
    z-index: 1001; /* über dem Bild */
    position: relative;
}

nav a {
    color: #f2f2f2;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

/* HERO-BILD FIXED */
.hero {
    position: fixed;
    top: 0; /* beginnt oben */
    left: 0;
    width: 100%;
    height: 100vh; /* volle Höhe des Viewports */
    object-fit: cover;
    z-index: 0; /* hinter Menü und Header */
}

/* TEXTBLOCK STARTET UNTER DEM HERO */
.container {
    position: relative;
    z-index: 2;
    max-width: 1000px;
    margin: 0 auto;
    padding: calc(100vh) 30px 60px 30px; /* Abstand: volle Hero-Höhe */
    background: rgba(242, 242, 242, 0.95);
}

/* GALERIE */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-top: 30px;
}

.gallery img {
    width: 100%;
    display: block;
}
</style>
</head>
<body>

<header class="header">
    <div class="header-name">
        Geigenbau Marta Nahlik
    </div>
    <nav>
        <a href="#">Instrumente</a>
        <a href="#">Studium</a>
        <a href="#">Über mich</a>
        <a href="#">Kontakt</a>
    </nav>
</header>

<img class="hero" src="images/IMG_4548.jpeg" alt="Werkstatt oder Instrument">

<div class="container">
    <h1>Instrumente</h1>
    <p>In meiner Arbeit liegt der Schwerpunkt auf der Fertigung von hochwertigen Streichinstrumenten nach historischen Vorbildern...</p>

    <div class="gallery">
        <img src="https://via.placeholder.com/400" alt="Bild 1">
        <img src="https://via.placeholder.com/400" alt="Bild 2">
        <img src="https://via.placeholder.com/400" alt="Bild 3">
    </div>
</div>

</body>
</html>
